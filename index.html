<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BRISPRIVATE CHAT | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --primary: #007bff; --text: #ffffff; --border: #333; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: var(--panel); width: 100%; max-width: 400px; height: 90vh; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; }
        .active { display: flex; }
        
        /* Cabeçalhos */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        
        input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        
        .btn-logout { background: var(--danger); width: auto; padding: 8px 15px; font-size: 13px; }
        
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; font-size: 14px; color: #fff; }
        .sent { align-self: flex-end; background: var(--primary); }
        .received { align-self: flex-start; background: #333; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .footer { display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="screen active">
        <h1 style="text-align:center; margin-bottom:20px;">BRISPRIVATE</h1>
        <input type="text" id="userInput" placeholder="Usuário">
        <input type="password" id="passInput" placeholder="Senha">
        <button onclick="handleAuth('login')">Entrar</button>
        <button onclick="handleAuth('signup')" style="background:none; color:var(--primary); margin-top:10px;">Criar Conta</button>
    </div>

    <div id="homeScreen" class="screen">
        <div class="header-bar">
            <h3>Conversas</h3>
            <button class="btn-logout" onclick="handleLogout()">Sair da Conta</button>
        </div>
        <input type="text" id="targetInput" placeholder="Nome do usuário...">
        <button onclick="startChat(document.getElementById('targetInput').value)">Abrir Chat</button>
        <div id="conversationsList" style="flex:1; overflow-y:auto; margin-top:20px;"></div>
    </div>

    <div id="chatScreen" class="screen">
        <div class="header-bar">
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="showHomeScreen()" style="width:auto; background:none; font-size:20px; padding:0;">❮</button>
                <b id="partnerTitle">...</b>
            </div>
            <button class="btn-logout" onclick="handleLogout()">Sair</button>
        </div>
        <div id="msgBox" class="messages"></div>
        <div class="footer">
            <label style="background:#333; padding:10px; border-radius:8px; cursor:pointer;">
                📷 <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="uploadPhoto()">
            </label>
            <input type="text" id="msgInput" placeholder="Mensagem..." style="margin:0; flex:1;">
            <button onclick="sendMsg()" style="width:auto;">↑</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://dwznzdnvtezhkqzqwrsa.supabase.co';
    const supabaseKey = 'sb_publishable_ZajKS3fZjhbLeGLdo-2IsA_sQgarlui';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let myProfile = null, activePartner = null;

    // Função de Logout (Sair)
    async function handleLogout() {
        const confirmacao = confirm("Deseja mesmo sair da conta?");
        if (confirmacao) {
            await _supabase.auth.signOut();
            myProfile = null;
            activePartner = null;
            // Limpa dados locais e volta para o login
            location.reload(); 
        }
    }

    async function handleAuth(mode) {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const email = `${user.toLowerCase()}@nexia.com`;

        try {
            if (mode === 'signup') {
                const { data, error } = await _supabase.auth.signUp({ email, password: pass });
                if (error) throw error;
                await _supabase.from('profiles').insert([{ id: data.user.id, username: user }]);
                alert("Conta criada!");
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
                if (error) throw error;
                const { data: prof } = await _supabase.from('profiles').select('*').eq('id', data.user.id).single();
                myProfile = prof;
                showHomeScreen();
                setupRealtime();
            }
        } catch (e) { alert("Erro: " + e.message); }
    }

    function showHomeScreen() {
        activePartner = null;
        showScreen('homeScreen');
        loadConversations();
    }

    async function loadConversations() {
        const { data } = await _supabase.from('messages').select('sender_id, receiver_id').or(`sender_id.eq.${myProfile.id},receiver_id.eq.${myProfile.id}`);
        const ids = [...new Set(data?.map(m => m.sender_id === myProfile.id ? m.receiver_id : m.sender_id))];
        const listDiv = document.getElementById('conversationsList');
        if (!ids.length) return listDiv.innerHTML = "<p style='color:#555; text-align:center;'>Nenhum chat ativo.</p>";
        const { data: profs } = await _supabase.from('profiles').select('*').in('id', ids);
        listDiv.innerHTML = profs.map(p => `<div onclick="startChat('${p.username}')" style="background:#222; padding:15px; border-radius:10px; margin-bottom:10px; cursor:pointer; display:flex; justify-content:space-between;"><span>${p.username}</span><span style="color:var(--primary)">❯</span></div>`).join('');
    }

    async function startChat(username) {
        const { data } = await _supabase.from('profiles').select('*').eq('username', username).single();
        if (!data) return alert("Usuário não encontrado.");
        activePartner = data;
        document.getElementById('partnerTitle').innerText = data.username;
        showScreen('chatScreen');
        loadMessages();
    }

    async function loadMessages() {
        if (!activePartner) return;
        const { data } = await _supabase.from('messages')
            .select('*')
            .or(`and(sender_id.eq.${myProfile.id},receiver_id.eq.${activePartner.id}),and(sender_id.eq.${activePartner.id},receiver_id.eq.${myProfile.id})`)
            .order('created_at', { ascending: true });
        renderMessages(data || []);
    }

    async function sendMsg(imgUrl = null) {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text && !imgUrl) return;
        await _supabase.from('messages').insert([{
            sender_id: myProfile.id, receiver_id: activePartner.id, content: text, image_url: imgUrl
        }]);
        input.value = "";
        loadMessages();
    }

    async function uploadPhoto() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const name = `${Date.now()}_img`;
        const { data } = await _supabase.storage.from('chat_media').upload(name, file);
        if (data) {
            const { data: url } = _supabase.storage.from('chat_media').getPublicUrl(name);
            sendMsg(url.publicUrl);
        }
    }

    function renderMessages(list) {
        const box = document.getElementById('msgBox');
        box.innerHTML = list.map(m => `
            <div class="msg ${m.sender_id === myProfile.id ? 'sent' : 'received'}">
                ${m.image_url ? `<img src="${m.image_url}">` : ''}
                <div>${m.content || ''}</div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function setupRealtime() {
        _supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
            loadMessages();
            loadConversations();
        }).subscribe();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
